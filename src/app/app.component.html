@if (!isLoginPage()) {
  <div class="nav-container">
    @if (!isLoggedIn()) {
      <button mat-button (click)="navigateToLogin()">Sign In</button>
    } @else {
      {{ authService.currentUser()?.email }}
      <button mat-button (click)="logout()">Logout</button>
    }
  </div>
}

<router-outlet></router-outlet>
