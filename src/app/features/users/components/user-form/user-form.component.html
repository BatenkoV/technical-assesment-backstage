<div class="user-manipulation-container">
  <mat-card class="user-manipulation-container__card" appearance="outlined">
    <mat-card-header>
      <mat-card-title>
        {{ isEditMode() ? 'Edit user' : 'Create new user' }}
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div class="user-manipulation-container__card__user-form" [formGroup]="userForm">
        @for (field of formFields; track field.controlName) {
          <mat-form-field class="user-manipulation-container__card__user-form__form-field">
            <mat-label>{{ field.label }}</mat-label>
            <input
              matInput
              [type]="field.type || 'text'"
              [formControlName]="field.controlName"
            >
          </mat-form-field>
        }

        <mat-card-actions>
          <button
            mat-button
            type="submit"
            (click)="submit()"
            [disabled]="isLoading"
          >
            {{ isEditMode() ? 'Save changes' : 'Create user' }}
          </button>
        </mat-card-actions>
      </div>
    </mat-card-content>
  </mat-card>
</div>
